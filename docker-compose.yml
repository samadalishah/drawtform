services:
  postgres:
    image: postgres:16-alpine
    container_name: drawtform-db
    environment:
      POSTGRES_USER: drawtform
      POSTGRES_PASSWORD: drawtform
      POSTGRES_DB: drawtform
    ports:
      - "5432:5432"
    volumes:
      - drawtform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawtform -d drawtform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  drawtform_pgdata:
